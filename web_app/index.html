<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BooksBot Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #0f1115);
      color: var(--tg-theme-text-color, #e8e8e8);
      display: grid; place-items: center; min-height: 100vh; text-align: center;
    }
    .card { padding: 2rem; max-width: 22rem; }
    h1 { font-size: 1.4rem; margin: 0 0 .5rem; }
    p  { opacity: .75; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📚 BooksBot Mini Apps</h1>
    <p>This is the Mini-App host. The eBook reader, audiobook player and games
       will live here in upcoming phases.</p>
  </div>
  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
  </script>
</body>
</html>
