<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BooksBot Games</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #0f1115);
    color: var(--tg-theme-text-color, #e8e8e8);
    padding: 16px; -webkit-tap-highlight-color: transparent;
  }
  .hint { color: var(--tg-theme-hint-color, #8a8f98); font-size: .9rem; }
  .bar { height: 6px; border-radius: 6px; background: rgba(127,127,127,.25); overflow: hidden; margin: 10px 0 18px; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--tg-theme-button-color, #3390ec); transition: width .3s; }
  h1 { font-size: 1.25rem; margin: .2rem 0 1rem; }
  .q { font-size: 1.1rem; font-weight: 600; margin: 14px 0 18px; line-height: 1.45; }
  button.opt, button.big {
    display: block; width: 100%; margin: 8px 0; padding: 14px 16px; border: 0;
    border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer;
    background: var(--tg-theme-secondary-bg-color, #1c2027);
    color: var(--tg-theme-text-color, #e8e8e8); text-align: left;
  }
  button.big { text-align: center; }
  .row { display: flex; gap: 10px; }
  .row > button { flex: 1; }
  .primary { background: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #fff); }
  .skip { background: transparent; color: var(--tg-theme-hint-color, #8a8f98); }
  .center { text-align: center; }
  .timer { float: right; font-variant-numeric: tabular-nums; font-weight: 700; }
  .res { font-size: 1rem; margin: 6px 0; }
  .big-num { font-size: 2rem; font-weight: 800; margin: 8px 0; }
  .pos { color: #2ecc71; } .neg { color: #e74c3c; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();
const params = new URLSearchParams(location.search);
const GAME = params.get("game") === "tf" ? "tf" : "quiz";
const app = document.getElementById("app");

let session = null, idx = 0, answers = [], timerInt = null, deadline = 0;

function h(html) { app.innerHTML = html; }
function esc(s){ return (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function screenStart() {
  if (GAME === "tf") return start("beginner");
  h(`<h1>🧠 Quiz</h1><p class="hint">Pick a difficulty. 8 questions · 2 plays/day.</p>
     <button class="big primary" data-l="beginner">🟢 Beginner</button>
     <button class="big" data-l="moderate">🟡 Moderate</button>
     <button class="big" data-l="advanced">🔴 Advanced</button>`);
  app.querySelectorAll("button[data-l]").forEach(b =>
    b.onclick = () => start(b.dataset.l));
}

async function start(level) {
  h(`<p class="center hint">Loading…</p>`);
  let r;
  try {
    r = await (await fetch("/api/game/new", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ init_data: tg?.initData || "", game: GAME, level })
    })).json();
  } catch (e) { return h(`<p class="center neg">Network error. Try again.</p>`); }
  if (r.error) return h(`<h1>🚫</h1><p class="center">${esc(r.error)}</p>
     <button class="big primary" onclick="tg?.close()">Close</button>`);
  session = r; idx = 0; answers = [];
  deadline = Date.now() + (r.time_limit || 900) * 1000;
  startTimer();
  renderQ();
}

function startTimer() {
  clearInterval(timerInt);
  timerInt = setInterval(() => {
    const left = Math.max(0, Math.round((deadline - Date.now()) / 1000));
    const el = document.getElementById("timer");
    if (el) { const m = Math.floor(left/60), s = left%60; el.textContent = `⏱ ${m}:${String(s).padStart(2,'0')}`; }
    if (left <= 0) { clearInterval(timerInt); finish(); }
  }, 500);
}

function renderQ() {
  const q = session.questions[idx];
  const total = session.questions.length;
  const pct = Math.round((idx / total) * 100);
  let opts = "";
  if (GAME === "quiz") {
    for (const k of ["A","B","C","D"]) {
      opts += `<button class="opt" data-a="${k}"><b>${k}.</b> ${esc(q.options[k])}</button>`;
    }
  } else {
    opts = `<div class="row">
       <button class="big primary" data-a="true">✅ TRUE</button>
       <button class="big" data-a="false">❌ FALSE</button></div>`;
  }
  h(`<div><span class="hint">Q ${idx+1}/${total}</span><span class="timer" id="timer">⏱</span></div>
     <div class="bar"><i style="width:${pct}%"></i></div>
     <div class="q">${esc(q.q)}</div>
     ${opts}
     <button class="big skip" data-skip="1">⏭ Skip (−${session.skip_cost})</button>`);
  app.querySelectorAll("button[data-a]").forEach(b =>
    b.onclick = () => answer(GAME === "tf" ? (b.dataset.a === "true") : b.dataset.a));
  app.querySelector("button[data-skip]").onclick = () => answer(null);
}

function answer(val) {
  answers[idx] = val;
  tg?.HapticFeedback?.impactOccurred?.("light");
  idx++;
  if (idx >= session.questions.length) finish();
  else renderQ();
}

async function finish() {
  clearInterval(timerInt);
  h(`<p class="center hint">Scoring…</p>`);
  let r;
  try {
    r = await (await fetch("/api/game/submit", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ init_data: tg?.initData || "", session_id: session.session_id, answers })
    })).json();
  } catch (e) { return h(`<p class="center neg">Network error submitting.</p>`); }
  if (r.error) return h(`<p class="center neg">${esc(r.error)}</p>
     <button class="big primary" onclick="tg?.close()">Close</button>`);
  const cls = r.total >= 0 ? "pos" : "neg";
  const sign = r.total >= 0 ? "+" : "";
  let extra = "";
  if (r.speed_bonus) extra += `<div class="res pos">🚀 Speed bonus +${r.speed_bonus} BGM</div>`;
  if (r.timeout_penalty) extra += `<div class="res neg">⏱ Timeout −${r.timeout_penalty} BGM</div>`;
  h(`<h1 class="center">🏁 Results</h1>
     <div class="center big-num ${cls}">${sign}${(r.total||0).toFixed(3)} BGM</div>
     <div class="res">✅ Correct: <b>${r.correct}</b></div>
     <div class="res">❌ Wrong: <b>${r.wrong}</b></div>
     <div class="res">⏭ Skipped: <b>${r.skipped}</b></div>
     ${extra}
     <button class="big primary" onclick="tg?.close()" style="margin-top:18px">Done</button>`);
  tg?.HapticFeedback?.notificationOccurred?.(r.total >= 0 ? "success" : "warning");
}

screenStart();
</script>
</body>
</html>
