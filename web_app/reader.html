<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Books Provider — Reader</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    color-scheme: light dark;
    --rbg: var(--tg-theme-bg-color,#0f1115);
    --rfg: var(--tg-theme-text-color,#e8e8e8);
    --accent: var(--tg-theme-button-color,#3390ec);
    --accent-fg: var(--tg-theme-button-text-color,#fff);
    --chrome: var(--tg-theme-secondary-bg-color,#1c2027);
    --hint-bg: var(--tg-theme-text-color,#e8e8e8);
    --hairline: rgba(127,127,127,.16);
    --soft: rgba(127,127,127,.12);
  }
  :root[data-theme="sepia"] { --rbg:#f4ecd8; --rfg:#5b4636; --chrome:#ece0c7; --hairline:rgba(91,70,54,.16); --soft:rgba(91,70,54,.10); }
  :root[data-theme="dark"]  { --rbg:#15171b; --rfg:#cfcfcf; --chrome:#1b1e24; --hairline:rgba(255,255,255,.10); --soft:rgba(255,255,255,.07); }
  :root[data-theme="light"] { --rbg:#ffffff; --rfg:#15171b; --chrome:#f4f5f7; --hairline:rgba(0,0,0,.08); --soft:rgba(0,0,0,.05); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; overflow:hidden; background: var(--rbg); color: var(--rfg);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    transition: background .25s ease, color .25s ease; }
  body { display:flex; flex-direction:column; }

  #bar { display:flex; align-items:center; gap:6px; padding:10px 12px; z-index:6; flex:0 0 auto;
    padding-top: max(10px, env(safe-area-inset-top));
    background: var(--chrome); color: var(--rfg);
    border-bottom:1px solid var(--hairline);
    box-shadow:0 1px 0 var(--hairline), 0 6px 20px -16px rgba(0,0,0,.55); }
  #bar button { border:0; border-radius:12px; padding:9px 12px; font-weight:700; cursor:pointer; line-height:1;
    background: var(--accent); color: var(--accent-fg);
    transition: transform .12s ease, opacity .15s ease, background .15s ease; }
  #bar button:active { transform: scale(.92); opacity:.85; }
  #bar .ghost { background:transparent; color: var(--rfg); font-size:1.25rem; opacity:.85; }
  #bar .ghost:active { background: var(--soft); opacity:1; }
  #bm { box-shadow:0 4px 12px -4px var(--accent); }
  #info { flex:1; text-align:center; font-size:.8rem; font-weight:600; letter-spacing:.02em;
    font-variant-numeric:tabular-nums; opacity:.78; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  #panel { display:none; gap:14px; padding:14px 12px; flex-wrap:wrap; align-items:center; flex:0 0 auto;
    background: var(--chrome); border-bottom:1px solid var(--hairline); z-index:5;
    animation: slideDown .22s ease; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  #panel .grp { display:flex; gap:6px; align-items:center; padding:5px 8px 5px 11px;
    border-radius:14px; background: var(--soft); }
  #panel .grp b { font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    opacity:.6; margin-right:3px; }
  #panel button { border:0; border-radius:10px; padding:8px 11px; cursor:pointer; font-weight:700; font-size:.92rem;
    line-height:1; min-width:38px; background: var(--rbg); color: var(--rfg);
    box-shadow:0 1px 2px rgba(0,0,0,.08); transition: transform .12s ease, background .15s ease, color .15s ease; }
  #panel button:active { transform: scale(.9); }
  #panel button.on { background: var(--accent); color: var(--accent-fg);
    box-shadow:0 4px 12px -4px var(--accent); }

  #bmwrap { padding:0 10px; flex:0 0 auto; max-height:64px; overflow:auto; -webkit-overflow-scrolling:touch; }
  #bmwrap:not(:empty) { padding-top:8px; padding-bottom:2px; }
  .bm { display:inline-block; margin:4px; padding:7px 12px; border-radius:11px;
    background: var(--soft); color: var(--rfg); cursor:pointer; font-size:.82rem; font-weight:600;
    border:1px solid var(--hairline); transition: transform .12s ease, background .15s ease; }
  .bm:active { transform: scale(.94); background: var(--accent); color: var(--accent-fg); }

  /* the touch surface: pinch-zoom, pan & swipe all happen here */
  #pane { flex:1 1 auto; min-height:0; position:relative; overflow:hidden;
    touch-action:none; -webkit-user-select:none; user-select:none; }
  #pdfc { position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform;
    image-rendering:auto; box-shadow:0 8px 32px -8px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.04);
    border-radius:6px; }
  #epub { position:absolute; inset:0; width:100%; height:100%; }

  #msg { display:none; flex:1; align-items:center; justify-content:center; flex-direction:column;
    padding:40px 28px; text-align:center; gap:6px; line-height:1.55;
    font-size:1.02rem; color: var(--rfg); }
  #msg .ico { font-size:2.6rem; line-height:1; margin-bottom:10px; opacity:.92; }
  #msg .ttl { font-size:1.15rem; font-weight:800; letter-spacing:-.01em; }
  #msg .sub { font-size:.92rem; opacity:.66; max-width:300px; }
  #msg button { margin-top:18px; padding:12px 22px; border:0; border-radius:13px; cursor:pointer;
    font-weight:800; font-size:.95rem; background: var(--accent); color: var(--accent-fg);
    box-shadow:0 8px 20px -8px var(--accent); transition: transform .12s ease; }
  #msg button:active { transform: scale(.95); }
  #msg .credit { margin-top:26px; font-size:.74rem; opacity:.42; line-height:1.5; }

  /* first-paint loading veil */
  #boot { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; z-index:3; background: var(--rbg); transition: opacity .3s ease; }
  #boot.hide { opacity:0; pointer-events:none; }
  #boot .spin { width:34px; height:34px; border-radius:50%;
    border:3px solid var(--soft); border-top-color: var(--accent); animation: spin .8s linear infinite; }
  #boot .lbl { font-size:.85rem; font-weight:600; letter-spacing:.04em; opacity:.6; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #hint { position:absolute; left:50%; bottom:18px; transform:translateX(-50%) translateY(6px); z-index:4;
    background:rgba(20,22,28,.86); color:#fff; padding:9px 16px; border-radius:22px;
    font-size:.78rem; font-weight:600; letter-spacing:.01em;
    box-shadow:0 8px 24px -8px rgba(0,0,0,.6); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    pointer-events:none; opacity:0; transition:opacity .3s ease, transform .3s ease; white-space:nowrap; }
  #hint.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="bar">
  <button class="ghost" id="prev" aria-label="Previous page" title="Previous page">‹</button>
  <div id="info">Opening your book…</div>
  <button class="ghost" id="next" aria-label="Next page" title="Next page">›</button>
  <button class="ghost" id="cog" aria-label="Reading settings" title="Reading settings">Aa</button>
  <button class="ghost" id="tts" aria-label="Read aloud" title="Read aloud">🔊</button>
  <button id="bm" aria-label="Save bookmark" title="Save bookmark">🔖</button>
</div>
<div id="panel">
  <div class="grp"><b>Theme</b>
    <button data-theme="light" title="Light" aria-label="Light theme">☀️</button><button data-theme="sepia" title="Sepia" aria-label="Sepia theme">📜</button><button data-theme="dark" title="Dark" aria-label="Dark theme">🌙</button></div>
  <div class="grp" id="fontgrp"><b>Text size</b>
    <button id="f-" aria-label="Smaller text">A−</button><button id="f+" aria-label="Larger text">A+</button></div>
  <div class="grp" id="spacegrp"><b>Spacing</b>
    <button id="s-" aria-label="Tighter spacing">≣−</button><button id="s+" aria-label="Looser spacing">≣+</button></div>
  <div class="grp" id="zoomgrp"><b>Zoom</b>
    <button id="z-" aria-label="Zoom out">−</button><button id="zfit" aria-label="Fit to width">Fit</button><button id="z+" aria-label="Zoom in">+</button></div>
</div>
<div id="bmwrap"></div>
<div id="pane">
  <canvas id="pdfc" style="display:none"></canvas>
  <div id="epub" style="display:none"></div>
  <div id="boot"><div class="spin"></div><div class="lbl">Preparing your book…</div></div>
  <div id="hint"></div>
</div>
<div id="msg"></div>

<script>
const tg = window.Telegram?.WebApp; tg?.ready(); tg?.expand();
// Stop Telegram from closing the Mini App / pulling-to-refresh on vertical
// drags so our swipe & pan gestures own the whole surface (Bot API 7.7+).
try { tg?.disableVerticalSwipes?.(); } catch (e) {}

const PDF_JS     = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js";
const PDF_WORKER = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js";
const JSZIP      = "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js";
const EPUBJS     = "https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js";

const q = new URLSearchParams(location.search);
const FUID = q.get("fuid"); const EXT = (q.get("ext")||"").toLowerCase();
const INIT = tg?.initData || "";
const info = document.getElementById("info");
const msg  = document.getElementById("msg");
const pane = document.getElementById("pane");
const pdfc = document.getElementById("pdfc");

let state = { page:0, loc:"", bookmarks:[] };
let mode = null, pdfDoc = null, pageNum = 1, rendition = null, book = null;
const DPR = Math.min(window.devicePixelRatio || 1, 3);

// ── reading preferences (localStorage; global, not per-file) ──
const PREFS = Object.assign({theme:"light", font:18, spacing:1.6},
  JSON.parse(localStorage.getItem("rprefs")||"{}"));
function savePrefs(){ localStorage.setItem("rprefs", JSON.stringify(PREFS)); }
function filterFor(t){ return t==="dark" ? "invert(0.92) hue-rotate(180deg)" : t==="sepia" ? "sepia(0.45)" : "none"; }
function applyPrefs(){
  document.documentElement.setAttribute("data-theme", PREFS.theme);
  document.querySelectorAll("#panel button[data-theme]").forEach(b=>
    b.classList.toggle("on", b.dataset.theme===PREFS.theme));
  if(pdfc) pdfc.style.filter = filterFor(PREFS.theme);
  if(rendition) applyEpubTheme();
}
function applyEpubTheme(){
  try{
    rendition.themes.register("r", { body: {
      background: PREFS.theme==="dark"?"#15171b":PREFS.theme==="sepia"?"#f4ecd8":"#fff",
      color: PREFS.theme==="dark"?"#cfcfcf":PREFS.theme==="sepia"?"#5b4636":"#15171b",
      "line-height": String(PREFS.spacing) } });
    rendition.themes.select("r");
    rendition.themes.fontSize(PREFS.font+"px");
  }catch(e){}
}
document.getElementById("cog").onclick=()=>{ const p=document.getElementById("panel");
  p.style.display = p.style.display==="flex"?"none":"flex"; };
document.querySelectorAll("#panel button[data-theme]").forEach(b=>
  b.onclick=()=>{ PREFS.theme=b.dataset.theme; savePrefs(); applyPrefs(); });
document.getElementById("f-").onclick=()=>{ PREFS.font=Math.max(12,PREFS.font-1); savePrefs(); applyPrefs(); };
document.getElementById("f+").onclick=()=>{ PREFS.font=Math.min(34,PREFS.font+1); savePrefs(); applyPrefs(); };
document.getElementById("s-").onclick=()=>{ PREFS.spacing=Math.max(1.2,+(PREFS.spacing-0.1).toFixed(1)); savePrefs(); applyPrefs(); };
document.getElementById("s+").onclick=()=>{ PREFS.spacing=Math.min(2.4,+(PREFS.spacing+0.1).toFixed(1)); savePrefs(); applyPrefs(); };
// Zoom buttons: PDF → real zoom (centred); the group is hidden for EPUB.
document.getElementById("z+").onclick  =()=> pdfZoomBy(1.25);
document.getElementById("z-").onclick  =()=> pdfZoomBy(1/1.25);
document.getElementById("zfit").onclick=()=> animateZoomTo(1, pane.clientWidth/2, pane.clientHeight/2);

let hintTimer=null;
function hint(t){ const h=document.getElementById("hint"); h.textContent=t; h.classList.add("show");
  clearTimeout(hintTimer); hintTimer=setTimeout(()=>h.classList.remove("show"), 1500); }
function hideBoot(){ const b=document.getElementById("boot"); if(b){ b.classList.add("hide"); setTimeout(()=>{ b.style.display="none"; }, 320); } }
function showMsg(t){ hideBoot(); msg.style.display="flex"; msg.innerHTML=t; pane.style.display="none"; }
async function api(p,o){ return (await fetch(p,o)).json(); }
async function loadState(){ try{ state = await api(`/api/reader/state?fuid=${FUID}&init_data=${encodeURIComponent(INIT)}`); }catch(e){} }
function saveState(x){ fetch("/api/reader/state",{method:"POST",headers:{"Content-Type":"application/json"},
  body: JSON.stringify({init_data:INIT, fuid:FUID, ...x})}); }
async function getBytes(){ const r=await fetch(`/api/file?fuid=${FUID}&init_data=${encodeURIComponent(INIT)}`);
  if(!r.ok){ const j=await r.json().catch(()=>({})); throw j.error||r.status; } return await r.arrayBuffer(); }
// Load a UMD library via a <script> tag. Telegram's in-app webview reliably
// blocks/fails ESM dynamic import() of remote modules, so we never use import().
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement("script");
  s.src=src; s.onload=res; s.onerror=()=>rej(new Error("Failed to load "+src)); document.head.appendChild(s); }); }
function haptic(k){ try{ tg?.HapticFeedback?.impactOccurred?.(k||"light"); }catch(e){} }

function renderBookmarks(){ const w=document.getElementById("bmwrap"); w.innerHTML="";
  (state.bookmarks||[]).forEach(b=>{ const s=document.createElement("span"); s.className="bm";
    s.textContent="🔖 "+(mode==="pdf"?("Page "+b):"Saved spot");
    s.onclick=()=> mode==="pdf"? goPdfPage(b) : rendition?.display(b); w.appendChild(s); }); }

/* ───────────────────────── PDF (canvas via pdf.js) ─────────────────────────
   View model: the page is rendered to a backing store at the committed `zoom`,
   then positioned/scaled live via a CSS transform for buttery pinch & pan.
     zoom   – committed zoom baked into the bitmap (1 = fit-to-width)
     gScale – live gesture scale on top (1 at rest), committed on gesture end
     tx,ty  – translate of the canvas top-left within #pane (CSS px)
   Effective zoom = zoom * gScale.                                            */
let fitW=0, zoom=1, gScale=1, tx=0, ty=0, rendering=false, pendingRender=null, pageTextCache="";

function dist(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
function applyTransform(){ pdfc.style.transform = `translate3d(${tx}px,${ty}px,0) scale(${gScale})`; }
function effZoom(){ return zoom*gScale; }

function clampPan(){
  const dispW = fitW*effZoom();
  const dispH = pdfc.height ? (pdfc.height/pdfc.width)*dispW : 0;
  const pw = pane.clientWidth, ph = pane.clientHeight;
  if(dispW <= pw+0.5){ tx = (pw - dispW)/2; }
  else { tx = Math.min(0, Math.max(pw - dispW, tx)); }
  if(dispH <= ph+0.5){ ty = (ph - dispH)/2; }
  else { ty = Math.min(0, Math.max(ph - dispH, ty)); }
}

async function renderPdfPage(keepPan){
  if(rendering){ pendingRender=keepPan; return; }
  rendering=true;
  if(!keepPan) pageTextCache="";   // page changed — drop stale read-aloud text
  try{
    const page = await pdfDoc.getPage(pageNum);
    const base = page.getViewport({scale:1});
    fitW = Math.min(pane.clientWidth, 1000);
    let renderScale = (fitW/base.width) * zoom * DPR;
    // cap the backing-store size so deep zoom can't blow up memory / crash
    const maxDim = 4096;
    if(base.width*renderScale > maxDim) renderScale = maxDim/base.width;
    const vp = page.getViewport({scale:renderScale});
    const ctx = pdfc.getContext("2d", {alpha:false});
    pdfc.width = Math.round(vp.width); pdfc.height = Math.round(vp.height);
    pdfc.style.width  = (fitW*zoom)+"px";
    pdfc.style.height = (fitW*zoom*base.height/base.width)+"px";
    await page.render({canvasContext:ctx, viewport:vp}).promise;
    if(!keepPan){ tx=0; ty=0; }
    gScale=1; clampPan();
    pdfc.style.transition=""; pdfc.style.opacity="0"; applyTransform();
    requestAnimationFrame(()=>{ pdfc.style.transition="opacity .15s ease-out"; pdfc.style.opacity="1";
      setTimeout(()=>{ pdfc.style.transition=""; }, 170); });
    info.textContent=`Page ${pageNum} of ${pdfDoc.numPages}`;
    const _capN=pageNum;   // cache this page's text so read-aloud can start inside the tap (iOS)
    page.getTextContent().then(tc=>{ if(pageNum===_capN) pageTextCache=tc.items.map(i=>i.str).join(" "); }).catch(()=>{});
    if(pageNum+1<=pdfDoc.numPages) pdfDoc.getPage(pageNum+1).catch(()=>{}); // warm cache
  } finally {
    rendering=false;
    if(pendingRender!=null){ const k=pendingRender; pendingRender=null; renderPdfPage(k); }
  }
}

async function initPdf(buf){ mode="pdf";
  document.getElementById("zoomgrp").style.display="flex";
  document.getElementById("fontgrp").style.display="none";
  document.getElementById("spacegrp").style.display="none";
  if(!window.pdfjsLib){ await loadScript(PDF_JS); }
  pdfjsLib.GlobalWorkerOptions.workerSrc=PDF_WORKER;
  pdfDoc = await pdfjsLib.getDocument({data:buf}).promise;
  pageNum = Math.min(Math.max(1, state.page||1), pdfDoc.numPages);
  pdfc.style.display="block"; applyPrefs();
  await renderPdfPage(false); hideBoot(); renderBookmarks();
  hint("Swipe to turn · pinch or double-tap to zoom");
  window.addEventListener("resize", debounce(()=>{ if(mode==="pdf"){ zoom=1; gScale=1; renderPdfPage(false); } }, 250));
}

function goPdfPage(n){
  pageNum = Math.min(Math.max(1, n), pdfDoc.numPages);
  zoom=1; gScale=1; renderPdfPage(false); saveState({page:pageNum});
}
function turnPdf(dir){
  const n = pageNum + dir;
  if(n<1 || n>pdfDoc.numPages){ haptic(); hint(dir<0?"You're at the first page":"You've reached the last page"); return; }
  pageNum = n; zoom=1; gScale=1; renderPdfPage(false); saveState({page:pageNum}); haptic("light");
}

/* zoom helpers (focal pinch about origin 0,0) */
function commitZoom(){
  const eff = Math.max(1, Math.min(5, effZoom()));
  if(Math.abs(eff-zoom) < 0.01){ gScale=1; clampPan(); applyTransform(); return; }
  zoom = eff; renderPdfPage(true);   // re-render crisp at the new zoom, keep pan
}
function animateZoomTo(target, fx, fy){
  target = Math.max(1, Math.min(5, target));
  const g = target/zoom;                       // gScale currently assumed 1
  const ntx = fx - (fx - tx)*g, nty = fy - (fy - ty)*g;
  pdfc.style.transition="transform .18s ease-out";
  gScale=g; tx=ntx; ty=nty; applyTransform();
  setTimeout(()=>{ pdfc.style.transition=""; commitZoom(); }, 190);
}
function pdfZoomBy(f){ if(mode!=="pdf") return; animateZoomTo(zoom*f, pane.clientWidth/2, pane.clientHeight/2); }

/* ── PDF touch gestures: swipe (turn) · drag (pan when zoomed) · pinch · 2-tap ── */
let touchMode=null, st={}, pin={}, lastTap=0;
pane.addEventListener("touchstart", e=>{
  if(mode!=="pdf") return;
  const r = pane.getBoundingClientRect();
  if(e.touches.length===2){
    touchMode="pinch"; const [a,b]=e.touches;
    pin.dist=dist(a,b); pin.fx=((a.clientX+b.clientX)/2)-r.left; pin.fy=((a.clientY+b.clientY)/2)-r.top;
    pin.tx=tx; pin.ty=ty; pin.startG=gScale;
  } else if(e.touches.length===1){
    const t=e.touches[0];
    st={x:t.clientX-r.left, y:t.clientY-r.top, tx:tx, ty:ty, t:Date.now(), moved:false};
    touchMode = effZoom()>1.01 ? "pan" : "swipe";
  }
}, {passive:false});

pane.addEventListener("touchmove", e=>{
  if(mode!=="pdf") return;
  const r = pane.getBoundingClientRect();
  if(touchMode==="pinch" && e.touches.length>=2){
    e.preventDefault();
    const [a,b]=e.touches; const d=dist(a,b);
    let g = pin.startG * (d/pin.dist);
    g = Math.max(1/zoom, Math.min(5/zoom, g));    // clamp effective zoom to [1,5]
    const k = g/pin.startG;
    tx = pin.fx - (pin.fx - pin.tx)*k;
    ty = pin.fy - (pin.fy - pin.ty)*k;
    gScale=g; applyTransform();
  } else if(touchMode==="pan"){
    e.preventDefault();
    const t=e.touches[0]; tx = st.tx + ((t.clientX-r.left)-st.x); ty = st.ty + ((t.clientY-r.top)-st.y);
    clampPan(); applyTransform();
  } else if(touchMode==="swipe"){
    const t=e.touches[0]; const dx=(t.clientX-r.left)-st.x, dy=(t.clientY-r.top)-st.y;
    if(Math.abs(dx)>6 || Math.abs(dy)>6) st.moved=true;
    if(Math.abs(dx) > Math.abs(dy)){ e.preventDefault(); tx = st.tx + dx*0.5; applyTransform(); } // rubber-band
  }
}, {passive:false});

pane.addEventListener("touchend", e=>{
  if(mode!=="pdf") return;
  if(touchMode==="pinch"){ commitZoom(); touchMode=null; return; }
  if(touchMode==="pan"){ clampPan(); applyTransform(); touchMode=null; return; }
  if(touchMode==="swipe"){
    const r = pane.getBoundingClientRect(); const t=e.changedTouches[0];
    const dx=(t.clientX-r.left)-st.x, dy=(t.clientY-r.top)-st.y, dt=Date.now()-st.t;
    tx = st.tx; applyTransform();                 // snap rubber-band back
    const fast = dt<400 && Math.abs(dx)>50;
    if((Math.abs(dx)>pane.clientWidth*0.20 || fast) && Math.abs(dx)>Math.abs(dy)){
      turnPdf(dx<0 ? 1 : -1);
    } else if(!st.moved){
      const now=Date.now();
      if(now-lastTap < 300){ lastTap=0; animateZoomTo(effZoom()>1.05?1:2, st.x, st.y); }
      else lastTap=now;
    }
  }
  touchMode=null;
}, {passive:false});

/* ───────────────────────── EPUB (epub.js) ─────────────────────────────────
   Reflowable text: swipe turns the page, pinch scales the font (its "zoom").  */
async function initEpub(buf){ mode="epub";
  document.getElementById("zoomgrp").style.display="none";
  document.getElementById("fontgrp").style.display="flex";
  document.getElementById("spacegrp").style.display="flex";
  if(!window.JSZip){ await loadScript(JSZIP); }
  if(!window.ePub){ await loadScript(EPUBJS); }
  document.getElementById("epub").style.display="block";
  book = ePub(buf);
  rendition = book.renderTo("epub", {width:"100%", height:"100%", spread:"none", flow:"paginated"});
  applyEpubTheme();
  rendition.hooks.content.register(c=>attachEpubGestures(c));
  await rendition.display(state.loc||undefined); hideBoot();
  info.textContent="Reading";
  rendition.on("relocated",(loc)=>{ state.loc=loc.start.cfi; saveState({loc:state.loc});
    info.textContent=`${Math.round((loc.start.percentage||0)*100)}% read`; });
  renderBookmarks();
  hint("Swipe to turn · pinch to resize text");
}
function attachEpubGestures(contents){
  try{
    const d = contents.document; let sx=0, sy=0, pd=0, pinching=false, swipeBlocked=false, startFont=PREFS.font;
    d.addEventListener("touchstart", ev=>{
      if(ev.touches.length===2){ pinching=true; swipeBlocked=true; pd=dist(ev.touches[0],ev.touches[1]); startFont=PREFS.font; }
      else if(ev.touches.length===1){ sx=ev.touches[0].clientX; sy=ev.touches[0].clientY; swipeBlocked=false; }
    }, {passive:true});
    d.addEventListener("touchmove", ev=>{
      if(pinching && ev.touches.length>=2){
        swipeBlocked=true;
        const nf = Math.max(12, Math.min(34, Math.round(startFont*(dist(ev.touches[0],ev.touches[1])/pd))));
        if(nf!==PREFS.font){ PREFS.font=nf; savePrefs(); applyEpubTheme(); }
      }
    }, {passive:true});
    d.addEventListener("touchend", ev=>{
      // While any finger is still down — or this lift is the tail of a pinch —
      // never treat it as a swipe (that caused a spurious page turn after a resize).
      if(pinching){ if(ev.touches.length<2) pinching=false; return; }
      if(ev.touches.length>0 || swipeBlocked){ if(ev.touches.length===0) swipeBlocked=false; return; }
      const t=ev.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
      if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){ dx<0 ? rendition.next() : rendition.prev(); haptic("light"); }
    }, {passive:true});
  }catch(e){}
}

/* bar buttons */
document.getElementById("prev").onclick=()=> mode==="pdf"? turnPdf(-1) : rendition?.prev();
document.getElementById("next").onclick=()=> mode==="pdf"? turnPdf(1)  : rendition?.next();
document.getElementById("bm").onclick=()=>{ const mark=mode==="pdf"?pageNum:state.loc;
  if(mark && !(state.bookmarks||[]).includes(mark)){ (state.bookmarks=state.bookmarks||[]).push(mark);
    saveState({bookmarks:state.bookmarks}); renderBookmarks(); haptic("light"); hint("Bookmark saved — pick up right here"); } };

/* ── TTS read-aloud — device voices via the Web Speech API.
   Made to work on mobile WebViews (iOS/WKWebView + Android), not just desktop:
   • iOS refuses any speak() that isn't started SYNCHRONOUSLY from the tap, so we
     never await before the first speak — EPUB text is read synchronously, and for
     PDF (whose text load is async) we fire a silent primer inside the tap to
     unlock the engine, then stream the page in.
   • iOS drops over-long utterances and Chrome/Android silently pause after ~15s,
     so we split the page into short sentence chunks and queue them.
   • a periodic resume() keep-alive defeats the Android/Chrome auto-pause bug. */
const tts = document.getElementById("tts");
const synth = window.speechSynthesis;
let ttsOn = false, ttsChunks = [], ttsIdx = 0, ttsKeepAlive = 0, ttsVoice = null;

function pickVoice(){
  if(!synth) return;
  const vs = synth.getVoices() || [];
  if(!vs.length) return;
  const want = (document.documentElement.lang || "en").slice(0,2).toLowerCase();
  ttsVoice = vs.find(v => (v.lang||"").toLowerCase().startsWith(want))
          || vs.find(v => (v.lang||"").toLowerCase().startsWith("en"))
          || vs[0];
}
if(synth){ pickVoice(); try{ synth.onvoiceschanged = pickVoice; }catch(e){} }

function currentTextSync(){   // EPUB text is available synchronously (iOS-safe)
  if(mode==="epub" && rendition){
    try{ const cs=rendition.getContents(); if(cs&&cs[0]) return cs[0].document.body.innerText||""; }catch(e){}
  }
  return null;
}
async function currentText(){ // async path (PDF needs getTextContent)
  if(mode==="pdf" && pdfDoc){
    const p=await pdfDoc.getPage(pageNum); const tc=await p.getTextContent();
    return tc.items.map(i=>i.str).join(" ");
  }
  const s=currentTextSync(); return s==null ? "" : s;
}

function chunkText(t){
  const out=[];
  (t.replace(/\s+/g," ").match(/[^.!?。！？]+[.!?。！？]*/g) || [t]).forEach(s=>{
    s=s.trim(); if(!s) return;
    while(s.length>180){ let cut=s.lastIndexOf(" ",180); if(cut<60) cut=180;
      out.push(s.slice(0,cut)); s=s.slice(cut).trim(); }
    if(s) out.push(s);
  });
  return out;
}
function speakNext(){
  if(!ttsOn || ttsIdx>=ttsChunks.length){ stopTTS(); return; }
  const u=new SpeechSynthesisUtterance(ttsChunks[ttsIdx++]);
  u.rate=1; u.pitch=1; if(ttsVoice){ u.voice=ttsVoice; u.lang=ttsVoice.lang; }
  u.onend=()=>{ if(ttsOn) speakNext(); };
  u.onerror=()=>{ if(ttsOn) speakNext(); };
  try{ synth.speak(u); }catch(e){ stopTTS(); }
}
function stopTTS(){
  ttsOn=false; ttsChunks=[]; ttsIdx=0;
  if(ttsKeepAlive){ clearInterval(ttsKeepAlive); ttsKeepAlive=0; }
  try{ synth && synth.cancel(); }catch(e){}
  tts.textContent="🔊";
}
function beginTTS(t){
  if(!ttsOn) return;                                  // user already stopped
  t=(t||"").replace(/ /g," ").slice(0,12000).trim();
  if(!t){ stopTTS(); hint("There's no readable text to narrate on this page."); return; }
  ttsChunks=chunkText(t); ttsIdx=0; speakNext();
}

tts.onclick=()=>{
  if(!synth){ hint("Read-aloud isn't supported on this device."); return; }
  if(ttsOn || synth.speaking || synth.pending){ stopTTS(); return; }   // toggle off
  ttsOn=true; tts.textContent="⏹";
  try{ synth.cancel(); }catch(e){}
  if(!ttsVoice) pickVoice();
  // resume() is a no-op while playing, so this safely unsticks the ~15s pause bug
  ttsKeepAlive=setInterval(()=>{ if(synth.speaking){ try{ synth.resume(); }catch(e){} } }, 5000);
  const sync=currentTextSync();
  const ready = (sync!=null && sync.trim()) ? sync
              : (pageTextCache && pageTextCache.trim()) ? pageTextCache
              : null;
  if(ready!=null){
    beginTTS(ready);                                  // text in hand → speak inside the tap (iOS-safe)
  }else{
    // text not ready (e.g. a big PDF page still extracting): unlock the engine
    // synchronously with a silent primer, then load the text and stream it
    const primer=new SpeechSynthesisUtterance(" "); primer.volume=0;
    try{ synth.speak(primer); }catch(e){}
    currentText().then(beginTTS).catch(()=>stopTTS());
  }
};

/* stop narration when the reader leaves the page or the user turns the page */
["prev","next"].forEach(id=>{ const el=document.getElementById(id);
  if(el) el.addEventListener("click", stopTTS); });
window.addEventListener("pagehide", stopTTS);
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) stopTTS(); });

function debounce(fn,ms){ let h; return (...a)=>{ clearTimeout(h); h=setTimeout(()=>fn(...a),ms); }; }

const CREDIT = `<div class="credit">Books Provider — curated &amp; cared for by<br>@bookslibraryofficial &amp; @trinityXmods and the team</div>`;
function stateCard(ico, ttl, sub, btn){
  return `<div class="ico">${ico}</div><div class="ttl">${ttl}</div><div class="sub">${sub}</div>`
    + (btn ? `<button onclick="tg?.close()">${btn}</button>` : "") + CREDIT;
}
(async ()=>{
  if(!FUID){ return showMsg(stateCard("📚","Nothing to open yet",
    "Pick a title from the library and we'll open it here in your reader.", "Back to library")); }
  applyPrefs(); await loadState(); let buf;
  try{ buf=await getBytes(); }
  catch(err){
    const card = err==="too_large"
        ? stateCard("📦","This one's a big read",
            "It's too large to open inside the reader. Tap below and we'll send the full file straight to your chat.", "Send it to my chat")
      : err==="stream_unavailable"
        ? stateCard("📨","Best enjoyed in chat",
            "This archived edition can't be streamed in the reader. Receive the complete file in your chat and enjoy it there.", "Send it to my chat")
      : err==="not_in_library"
        ? stateCard("🔒","Add it to Favorites first",
            "Save this title to your Favorites and it'll be ready to open in your reader anytime.", "Got it")
      : stateCard("😕","We couldn't open this one",
            "Something interrupted the loading. Please try again in a moment — your place is saved.", "Close");
    return showMsg(card); }
  try{ if(EXT==="pdf") await initPdf(buf); else if(EXT==="epub") await initEpub(buf);
    else showMsg(stateCard("📄","Not readable in-app — yet",
      "This format isn't supported by the in-app reader. We'll deliver it to your chat so you never miss a page.", "Send it to my chat")); }
  catch(e){ showMsg(stateCard("😕","Couldn't render this book",
      "We hit a snag while preparing the pages. Please try opening it again — we'll have it ready.", "Close")); }
})();
</script>
